<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Portfolio · secure units</title>
  <!-- Font & minimal icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e9f0f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .app-card {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 3.5rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 20, 30, 0.2), 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    h1, h2, h3 {
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      background: #1e2b3c;
      color: white;
      padding: 0.35rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .btn {
      background: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.04);
      transition: 0.2s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #1a2634;
    }
    .btn-primary {
      background: #1a2b3e;
      color: white;
      border: 1px solid #1a2b3e;
    }
    .btn-primary:hover {
      background: #0f1d2c;
      transform: scale(0.97);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #b0c4d4;
    }
    .btn-outline:hover {
      background: #e6eef6;
    }
    .btn-danger {
      background: #b13e4b;
      color: white;
      border-color: #b13e4b;
    }
    .btn-danger:hover {
      background: #8f2f3a;
    }
    .btn-success {
      background: #1f7b4d;
      color: white;
      border-color: #1f7b4d;
    }
    .btn-success:hover {
      background: #13633b;
    }
    .card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      border-radius: 2.5rem;
      padding: 1.8rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.7);
      margin-top: 1.5rem;
    }
    .input-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0;
    }
    .input-group input, .input-group select {
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #d9e2ec;
      background: white;
      font-size: 0.95rem;
      flex: 1 1 180px;
      outline: none;
      transition: 0.15s;
    }
    .input-group input:focus, .input-group select:focus {
      border-color: #1a2b3e;
      box-shadow: 0 0 0 3px rgba(26,43,62,0.2);
    }
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.2rem;
      margin: 1.5rem 0 0.5rem;
    }
    .unit-item {
      background: white;
      border-radius: 2rem;
      padding: 1.2rem 1.2rem 1rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      border: 1px solid #eef4f9;
      transition: 0.15s;
    }
    .unit-item:hover {
      border-color: #cbdae6;
    }
    .unit-item .unit-header {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      color: #1a2b3e;
      border-bottom: 1px dashed #dce6ef;
      padding-bottom: 0.4rem;
      margin-bottom: 0.6rem;
    }
    .item-list {
      list-style: none;
      margin: 0.5rem 0 0.2rem;
      font-size: 0.9rem;
    }
    .item-list li {
      padding: 0.2rem 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #f0f4fa;
    }
    .item-list li:last-child {
      border: none;
    }
    .item-count {
      background: #eef3f8;
      border-radius: 40px;
      padding: 0.1rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .admin-section {
      background: #e2eaf3;
      border-radius: 2.5rem;
      padding: 1.8rem;
      margin-top: 2rem;
      border: 1px solid #b9cedf;
    }
    .admin-section h3 {
      color: #0b1a2b;
    }
    .flash-message {
      background: #1a2b3e;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      margin: 0.5rem 0;
    }
    .hidden {
      display: none !important;
    }
    .muted {
      color: #4f677b;
      font-size: 0.85rem;
    }
    .flex-gap {
      gap: 0.8rem;
    }
    .flex-wrap {
      flex-wrap: wrap;
    }
    i {
      width: 1.2rem;
    }
    hr {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.05);
      margin: 1.8rem 0 0.5rem;
    }
  </style>
</head>
<body>
<div class="app-card" id="app">
  <!-- header -->
  <div class="flex-between">
    <div class="flex-row">
      <i class="fas fa-echo" style="font-size: 2rem; color: #1a2b3e;"></i>
      <h1 style="font-weight: 700;">Echo Portfolio</h1>
      <span class="badge"><i class="fas fa-shield-alt"></i> secure</span>
    </div>
    <div>
      <span id="userDisplay" class="muted" style="margin-right: 1rem;"><i class="fas fa-user-circle"></i> guest</span>
      <button class="btn btn-outline" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> logout</button>
    </div>
  </div>

  <!-- login / signup -->
  <div id="authSection" class="card">
    <div class="flex-row flex-wrap" style="justify-content: center;">
      <div class="input-group" style="flex: 2 1 300px;">
        <input type="text" id="authUsername" placeholder="username" value="demo">
        <input type="password" id="authPassword" placeholder="password" value="demo123">
        <button class="btn btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> sign in</button>
        <button class="btn btn-outline" id="signupBtn"><i class="fas fa-user-plus"></i> sign up</button>
      </div>
      <span class="muted" style="font-size:0.8rem;"><i class="fas fa-info-circle"></i> demo: demo / demo123</span>
    </div>
    <div id="authMessage" class="flash-message hidden"></div>
  </div>

  <!-- main user area -->
  <div id="userArea" class="hidden">
    <div class="flex-between" style="margin-top: 0.5rem;">
      <h3><i class="fas fa-layer-group"></i> your units <span class="badge" id="unitCounter">0 / 40</span></h3>
      <div class="flex-row flex-gap">
        <button class="btn btn-primary" id="addUnitBtn"><i class="fas fa-plus-circle"></i> add unit</button>
      </div>
    </div>

    <!-- add unit inline -->
    <div id="addUnitForm" class="hidden card" style="padding: 1rem 1.8rem; margin-top: 0.5rem;">
      <div class="input-group">
        <input type="text" id="newUnitName" placeholder="unit name (e.g. 'Design')">
        <button class="btn btn-success" id="confirmAddUnit"><i class="fas fa-check"></i> create</button>
        <button class="btn btn-outline" id="cancelAddUnit">cancel</button>
      </div>
    </div>

    <!-- units grid -->
    <div id="unitsContainer" class="unit-grid"></div>

    <!-- add item to unit (dynamic) -->
    <div id="addItemPanel" class="hidden card" style="padding: 1rem 1.8rem; margin-top: 0.5rem;">
      <div class="flex-between">
        <span><i class="fas fa-pen"></i> add item to <strong id="itemUnitNameDisplay"></strong> <span class="item-count" id="itemCountDisplay">0/10</span></span>
        <div class="flex-row flex-gap">
          <input type="text" id="newItemInput" placeholder="item name">
          <button class="btn btn-success" id="confirmAddItem"><i class="fas fa-save"></i> add</button>
          <button class="btn btn-outline" id="cancelAddItem">cancel</button>
        </div>
      </div>
    </div>

    <!-- admin panel (visible only to admin) -->
    <div id="adminPanel" class="admin-section hidden">
      <h3><i class="fas fa-user-shield"></i> admin · all users</h3>
      <div id="adminUserList" style="margin-top: 0.8rem; max-height: 220px; overflow-y: auto;"></div>
    </div>
  </div>

  <div id="globalMessage" class="flash-message hidden" style="margin-top: 1.5rem;"></div>
</div>

<script>
  (function() {
    // ---------- state ----------
    const STATE = {
      users: [],            // { username, password, units: [ { unitName, items: [] } ] }
      currentUser: null,    // username (string)
      adminUser: 'admin',   // fixed admin
      adminPass: 'admin123',
      maxUnits: 40,
      maxItemsPerUnit: 10,
      // UI temp
      selectedUnitForItem: null,
    };

    // ---------- helpers ----------
    function findUser(username) {
      return STATE.users.find(u => u.username === username);
    }

    function getCurrentUserData() {
      if (!STATE.currentUser) return null;
      return findUser(STATE.currentUser);
    }

    // check if user is admin
    function isAdmin() {
      return STATE.currentUser === STATE.adminUser;
    }

    // generate unique id for items (simple)
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }

    // ---------- persistence (localStorage) ----------
    function saveState() {
      try {
        localStorage.setItem('echoPortfolioData', JSON.stringify(STATE.users));
      } catch (e) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem('echoPortfolioData');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) STATE.users = parsed;
        }
      } catch (e) {}
    }

    // ---------- authentication ----------
    function loginUser(username, password) {
      if (!username || !password) return { success: false, msg: 'username and password required' };
      const user = findUser(username);
      if (!user) return { success: false, msg: 'user not found' };
      if (user.password !== password) return { success: false, msg: 'incorrect password' };
      STATE.currentUser = username;
      saveState();
      return { success: true, msg: `welcome, ${username}` };
    }

    function signupUser(username, password) {
      if (!username || !password) return { success: false, msg: 'username and password required' };
      if (username === STATE.adminUser) return { success: false, msg: 'reserved username' };
      if (findUser(username)) return { success: false, msg: 'username already exists' };
      const newUser = { username, password, units: [] };
      STATE.users.push(newUser);
      STATE.currentUser = username;
      saveState();
      return { success: true, msg: `account created, welcome ${username}` };
    }

    function logout() {
      STATE.currentUser = null;
      STATE.selectedUnitForItem = null;
      renderAll();
    }

    // ---------- unit & item operations (with concurrency handling via save/load) ----------
    function addUnit(unitName) {
      const user = getCurrentUserData();
      if (!user) return { success: false, msg: 'not logged in' };
      if (user.units.length >= STATE.maxUnits) return { success: false, msg: `max ${STATE.maxUnits} units reached` };
      if (user.units.some(u => u.unitName === unitName)) return { success: false, msg: 'unit already exists' };
      user.units.push({ unitName, items: [] });
      saveState();
      return { success: true, msg: `unit "${unitName}" added` };
    }

    function addItemToUnit(unitName, itemName) {
      const user = getCurrentUserData();
      if (!user) return { success: false, msg: 'not logged in' };
      const unit = user.units.find(u => u.unitName === unitName);
      if (!unit) return { success: false, msg: 'unit not found' };
      if (unit.items.length >= STATE.maxItemsPerUnit) return { success: false, msg: `max ${STATE.maxItemsPerUnit} items per unit` };
      // duplicate item name? allow but we can block if needed (optional)
      unit.items.push({ id: genId(), name: itemName });
      saveState();
      return { success: true, msg: `item added to ${unitName}` };
    }

    function removeItemFromUnit(unitName, itemId) {
      const user = getCurrentUserData();
      if (!user) return { success: false, msg: 'not logged in' };
      const unit = user.units.find(u => u.unitName === unitName);
      if (!unit) return { success: false, msg: 'unit not found' };
      const idx = unit.items.findIndex(it => it.id === itemId);
      if (idx === -1) return { success: false, msg: 'item not found' };
      unit.items.splice(idx, 1);
      saveState();
      return { success: true, msg: 'item removed' };
    }

    function removeUnit(unitName) {
      const user = getCurrentUserData();
      if (!user) return { success: false, msg: 'not logged in' };
      const idx = user.units.findIndex(u => u.unitName === unitName);
      if (idx === -1) return { success: false, msg: 'unit not found' };
      user.units.splice(idx, 1);
      saveState();
      return { success: true, msg: 'unit removed' };
    }

    // admin: get all users (only for admin)
    function adminGetAllUsers() {
      if (!isAdmin()) return [];
      return STATE.users.map(u => ({ username: u.username, unitCount: u.units.length, units: u.units }));
    }

    // ---------- render ----------
    function renderAll() {
      const isLoggedIn = !!STATE.currentUser;
      const user = getCurrentUserData();

      // auth section
      document.getElementById('authSection').classList.toggle('hidden', isLoggedIn);
      document.getElementById('userArea').classList.toggle('hidden', !isLoggedIn);
      document.getElementById('logoutBtn').style.display = isLoggedIn ? 'inline-flex' : 'none';
      document.getElementById('userDisplay').innerHTML = isLoggedIn ? `<i class="fas fa-user-circle"></i> ${STATE.currentUser}` : '<i class="fas fa-user-circle"></i> guest';

      // admin panel
      const adminPanel = document.getElementById('adminPanel');
      if (isLoggedIn && isAdmin()) {
        adminPanel.classList.remove('hidden');
        renderAdminPanel();
      } else {
        adminPanel.classList.add('hidden');
      }

      if (isLoggedIn && user) {
        // unit counter
        document.getElementById('unitCounter').textContent = `${user.units.length} / ${STATE.maxUnits}`;
        renderUnits(user);
      }

      // hide add item panel if not selected
      if (!STATE.selectedUnitForItem) {
        document.getElementById('addItemPanel').classList.add('hidden');
      } else {
        // re-check if unit still exists
        const unit = user ? user.units.find(u => u.unitName === STATE.selectedUnitForItem) : null;
        if (!unit) {
          STATE.selectedUnitForItem = null;
          document.getElementById('addItemPanel').classList.add('hidden');
        } else {
          document.getElementById('addItemPanel').classList.remove('hidden');
          document.getElementById('itemUnitNameDisplay').textContent = unit.unitName;
          document.getElementById('itemCountDisplay').textContent = `${unit.items.length}/${STATE.maxItemsPerUnit}`;
        }
      }
      // hide add unit form
      document.getElementById('addUnitForm').classList.add('hidden');
    }

    function renderUnits(user) {
      const container = document.getElementById('unitsContainer');
      if (!user || user.units.length === 0) {
        container.innerHTML = `<div class="muted" style="grid-column:1/-1; padding: 2rem 0; text-align:center;"><i class="fas fa-inbox"></i> no units yet — add your first unit</div>`;
        return;
      }
      container.innerHTML = user.units.map(unit => {
        const itemsHtml = unit.items.map(item => `
          <li>
            <span>${item.name}</span>
            <button class="btn btn-danger" style="padding: 0.1rem 0.7rem; font-size: 0.7rem;" data-unit="${unit.unitName}" data-itemid="${item.id}"><i class="fas fa-trash-alt"></i></button>
          </li>
        `).join('');
        return `
          <div class="unit-item">
            <div class="unit-header">
              <span><i class="fas fa-folder"></i> ${unit.unitName}</span>
              <span class="item-count">${unit.items.length}/${STATE.maxItemsPerUnit}</span>
            </div>
            <ul class="item-list">${itemsHtml || '<li class="muted" style="border:none;">no items</li>'}</ul>
            <div style="display:flex; gap:0.4rem; margin-top:0.8rem; flex-wrap:wrap;">
              <button class="btn btn-outline" style="padding:0.2rem 0.8rem; font-size:0.75rem;" data-unit-additem="${unit.unitName}"><i class="fas fa-plus"></i> item</button>
              <button class="btn btn-danger" style="padding:0.2rem 0.8rem; font-size:0.75rem;" data-unit-remove="${unit.unitName}"><i class="fas fa-times"></i> unit</button>
            </div>
          </div>
        `;
      }).join('');

      // event listeners for unit actions
      container.querySelectorAll('[data-unit-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const unitName = e.currentTarget.dataset.unitRemove;
          if (confirm(`remove unit "${unitName}" and all items?`)) {
            const res = removeUnit(unitName);
            showGlobalMessage(res.msg, res.success ? 'success' : 'error');
            renderAll();
          }
        });
      });

      container.querySelectorAll('[data-unit-additem]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const unitName = e.currentTarget.dataset.unitAdditem;
          STATE.selectedUnitForItem = unitName;
          renderAll();
          document.getElementById('newItemInput').value = '';
          document.getElementById('newItemInput').focus();
        });
      });

      container.querySelectorAll('[data-itemid]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const unitName = e.currentTarget.dataset.unit;
          const itemId = e.currentTarget.dataset.itemid;
          const res = removeItemFromUnit(unitName, itemId);
          showGlobalMessage(res.msg, res.success ? 'success' : 'error');
          renderAll();
        });
      });
    }

    function renderAdminPanel() {
      const container = document.getElementById('adminUserList');
      const all = adminGetAllUsers();
      if (all.length === 0) {
        container.innerHTML = '<div class="muted">no users registered</div>';
        return;
      }
      container.innerHTML = all.map(u => `
        <div style="background:white; border-radius:2rem; padding:0.5rem 1.2rem; margin-bottom:0.3rem; display:flex; justify-content:space-between;">
          <span><i class="fas fa-user"></i> ${u.username}</span>
          <span class="item-count">${u.unitCount} units</span>
        </div>
      `).join('');
    }

    // ---------- UI messages ----------
    function showGlobalMessage(msg, type = 'info') {
      const el = document.getElementById('globalMessage');
      el.textContent = msg;
      el.classList.remove('hidden');
      el.style.background = type === 'error' ? '#b13e4b' : '#1a2b3e';
      setTimeout(() => el.classList.add('hidden'), 3500);
    }

    function showAuthMessage(msg, type = 'info') {
      const el = document.getElementById('authMessage');
      el.textContent = msg;
      el.classList.remove('hidden');
      el.style.background = type === 'error' ? '#b13e4b' : '#1a2b3e';
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    // ---------- event bindings ----------
    function initEvents() {
      // login
      document.getElementById('loginBtn').addEventListener('click', () => {
        const user = document.getElementById('authUsername').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        const res = loginUser(user, pass);
        if (res.success) {
          showAuthMessage(res.msg, 'success');
          renderAll();
        } else {
          showAuthMessage(res.msg, 'error');
        }
      });

      // signup
      document.getElementById('signupBtn').addEventListener('click', () => {
        const user = document.getElementById('authUsername').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        const res = signupUser(user, pass);
        if (res.success) {
          showAuthMessage(res.msg, 'success');
          renderAll();
        } else {
          showAuthMessage(res.msg, 'error');
        }
      });

      // logout
      document.getElementById('logoutBtn').addEventListener('click', () => {
        logout();
        renderAll();
        showGlobalMessage('logged out', 'info');
      });

      // add unit
      document.getElementById('addUnitBtn').addEventListener('click', () => {
        const form = document.getElementById('addUnitForm');
        form.classList.toggle('hidden');
        if (!form.classList.contains('hidden')) {
          document.getElementById('newUnitName').value = '';
          document.getElementById('newUnitName').focus();
        }
      });
      document.getElementById('cancelAddUnit').addEventListener('click', () => {
        document.getElementById('addUnitForm').classList.add('hidden');
      });
      document.getElementById('confirmAddUnit').addEventListener('click', () => {
        const name = document.getElementById('newUnitName').value.trim();
        if (!name) { showGlobalMessage('enter unit name', 'error'); return; }
        const res = addUnit(name);
        showGlobalMessage(res.msg, res.success ? 'success' : 'error');
        document.getElementById('addUnitForm').classList.add('hidden');
        renderAll();
      });

      // add item panel
      document.getElementById('cancelAddItem').addEventListener('click', () => {
        STATE.selectedUnitForItem = null;
        renderAll();
      });
      document.getElementById('confirmAddItem').addEventListener('click', () => {
        const itemName = document.getElementById('newItemInput').value.trim();
        if (!itemName) { showGlobalMessage('enter item name', 'error'); return; }
        if (!STATE.selectedUnitForItem) { showGlobalMessage('no unit selected', 'error'); return; }
        const res = addItemToUnit(STATE.selectedUnitForItem, itemName);
        showGlobalMessage(res.msg, res.success ? 'success' : 'error');
        if (res.success) {
          document.getElementById('newItemInput').value = '';
          renderAll();
          // keep panel open
        } else {
          renderAll();
        }
      });

      // enter key on inputs
      document.getElementById('newUnitName').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('confirmAddUnit').click();
      });
      document.getElementById('newItemInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('confirmAddItem').click();
      });
      document.getElementById('authPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
      });
    }

    // ---------- boot ----------
    function init() {
      loadState();
      // if admin doesn't exist, create it (but we keep it fixed)
      if (!findUser(STATE.adminUser)) {
        STATE.users.push({ username: STATE.adminUser, password: STATE.adminPass, units: [] });
        saveState();
      }
      initEvents();
      renderAll();
      // show welcome message
      if (STATE.currentUser) {
        showGlobalMessage(`welcome back, ${STATE.currentUser}`, 'info');
      } else {
        showGlobalMessage('sign in or create account', 'info');
      }
    }

    init();
  })();
</script>
</body>
</html>
